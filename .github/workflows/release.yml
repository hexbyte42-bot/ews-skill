name: Release ews_skilld

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install curl dependencies (NTLM-capable)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            libcurl4-openssl-dev \
            ca-certificates \
            pkg-config

      - name: Show curl features
        run: |
          curl -V
          pkg-config --modversion libcurl || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build checks
        run: cargo check --all-targets

      - name: Build release daemon
        run: cargo build --release --bin ews_skilld

      - name: Show linked curl libs
        run: |
          ldd ./target/release/ews_skilld | grep -i curl || true

      - name: Verify NTLM support in binary
        run: |
          ./target/release/ews_skilld --check-ntlm

      - name: Package release bundle
        run: |
          mkdir -p release
          cp target/release/ews_skilld release/
          cp config.toml.example release/
          cp openclaw/stdio-service.example.json release/
          cp systemd/ews-skill-sync.service release/
          tar -czf ews-skilld-linux-x86_64.tar.gz -C release ews_skilld config.toml.example stdio-service.example.json ews-skill-sync.service
          sha256sum ews-skilld-linux-x86_64.tar.gz > ews-skilld-linux-x86_64.tar.gz.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ews-skilld-linux-x86_64
          path: |
            ews-skilld-linux-x86_64.tar.gz
            ews-skilld-linux-x86_64.tar.gz.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ews-skilld-linux-x86_64.tar.gz
            ews-skilld-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
